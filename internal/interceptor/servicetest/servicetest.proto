syntax = "proto3";

import "buf/validate/validate.proto";

option go_package = "github.com/openkcm/registry/internal/interceptor/servicetest";

service TestService {
  rpc TestCall(TestCallRequest) returns (TestCallResponse) {}
  rpc TestCallStream(TestCallRequest) returns (stream TestCallResponse) {}
}

message TestCallRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 40
  ];
}

message TestCallResponse {
  string id = 1;
}
