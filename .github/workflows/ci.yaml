name: Quality

on:
  push:
    tags:
      - v*
    branches:
      - main
    paths-ignore:
      - 'charts/**'
      - 'docs/**'
      - 'LICENSES/**'
      - '.releases/**'
      - '.github/**'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    uses: openkcm/build/.github/workflows/ci.svc.yaml@main
    secrets: inherit
    with:
      run_task_tests: false
      run_makefile_tests: true
      makefile_test_name: integration-test
