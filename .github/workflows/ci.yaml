name: Quality

on:
  push:
    tags:
      - v*
    branches:
      - main
    paths-ignore:
      - 'charts/**'
      - 'docs/**'
      - 'LICENSES/**'
      - '.releases/**'
      - '.github/**'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    uses: openkcm/build/.github/workflows/ci.svc.yaml@7410b3341d4752b66e1b68327f8a9d8ae3ed81c0 # main
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      run_task_tests: false
      run_makefile_tests: true
      makefile_test_name: integration-test
