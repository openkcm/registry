name: "CodeQL::Analyze"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  schedule:
    - cron: '16 11 * * 5'

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    uses: openkcm/build/.github/workflows/codeql.yaml@a3b997812361a5824f246b6fc600284aafb05d5a # main
    secrets: inherit # zizmor: ignore[secrets-inherit]
